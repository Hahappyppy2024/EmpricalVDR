{% extends "base.html" %}{% block content %}
<h1>My Quiz Attempts</h1>
<table><tr><th>Attempt</th><th>Quiz</th><th>Course</th><th>Started</th><th>Submitted</th></tr>
{% for a in attempts %}
<tr><td>{{a.attempt_id}}</td><td>{{a.quiz_title}} ({{a.quiz_id}})</td><td>{{a.course_id}}</td><td>{{a.started_at}}</td><td>{{a.submitted_at}}</td></tr>
{% endfor %}
</table>
{% endblock %}
