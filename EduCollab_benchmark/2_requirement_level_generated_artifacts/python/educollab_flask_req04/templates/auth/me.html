{% extends 'base.html' %}
{% block content %}
<h1>My Profile</h1>
<div class="card">
  <p><strong>User ID:</strong> {{ user['user_id'] }}</p>
  <p><strong>Username:</strong> {{ user['username'] }}</p>
  <p><strong>Display Name:</strong> {{ user['display_name'] }}</p>
  <p><strong>Created At:</strong> {{ user['created_at'] }}</p>
</div>
{% endblock %}
