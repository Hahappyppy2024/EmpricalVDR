<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EduCollab</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    nav a, nav form { display: inline-block; margin-right: 0.75rem; }
    nav form { margin: 0; }
    .error { color: #b00020; }
    .card { border: 1px solid #ccc; padding: 1rem; margin: 1rem 0; }
    input, textarea { width: 100%; padding: 0.5rem; margin: 0.25rem 0 1rem; }
    button { padding: 0.5rem 1rem; }
  </style>
</head>
<body>
  <nav>
    <a href="{{ url_for('page.home') }}">Home</a>
    <a href="{{ url_for('courses.list_courses_page') }}">Courses</a>
    {% if current_user or user %}
      <a href="{{ url_for('auth.me_page') }}">Me</a>
      <a href="{{ url_for('auth.users_page') }}">Users</a>
      <a href="{{ url_for('courses.new_course_page') }}">New Course</a>
      <form action="{{ url_for('auth.logout_submit') }}" method="post">
        <button type="submit">Logout</button>
      </form>
    {% else %}
      <a href="{{ url_for('auth.login_page') }}">Login</a>
      <a href="{{ url_for('auth.register_page') }}">Register</a>
    {% endif %}
  </nav>
  <hr>
  {% block content %}{% endblock %}
</body>
</html>
