{% extends 'base.html' %}
{% block content %}
<h1>Courses</h1>
{% for course in courses %}
<div class="card">
  <p><strong><a href="{{ url_for('courses.get_course_page', course_id=course['course_id']) }}">{{ course['title'] }}</a></strong></p>
  <p>{{ course['description'] }}</p>
  <p>Created by {{ course['creator_name'] }} at {{ course['created_at'] }}</p>
</div>
{% else %}
<p>No courses found.</p>
{% endfor %}
{% endblock %}
