{% extends "base.html" %}{% block content %}<h1>Edit Quiz</h1>{% if error %}<p>{{ error }}</p>{% endif %}<form method="post" action="/courses/{{ course.course_id }}/quizzes/{{ quiz.quiz_id }}"><p>Title: <input name="title" value="{{ quiz.title }}"></p><p>Description: <textarea name="description">{{ quiz.description }}</textarea></p><p>Open At: <input name="open_at" value="{{ quiz.open_at }}"></p><p>Due At: <input name="due_at" value="{{ quiz.due_at }}"></p><button type="submit">Save</button></form>{% endblock %}
