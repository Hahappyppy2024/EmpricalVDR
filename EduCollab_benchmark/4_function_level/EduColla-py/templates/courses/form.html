{% extends "base.html" %}
{% block content %}
<h2>{{ course and 'Edit Course' or 'Create Course' }}</h2>
<form method="post">
    <div class="mb-3">
        <label>Title</label>
        <input type="text" name="title" class="form-control" value="{{ course and course.title or '' }}" required>
    </div>
    <div class="mb-3">
        <label>Description</label>
        <textarea name="description" class="form-control">{{ course and course.description or '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('course.list_courses') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
