{% extends "base.html" %}
{% block content %}

<h2>Configure Quiz Questions</h2>

<form method="post" action="{{ url_for('quiz.configure_quiz_questions', course_id=course_id, quiz_id=quiz_id) }}">
  <div class="mb-3">
    <label>Question</label>
    <select name="question_id" class="form-control" required>
      {% for q in questions %}
        <option value="{{ q['question_id'] }}">{{ q['prompt'] }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="mb-3">
    <label>Points</label>
    <input name="points" type="number" class="form-control" value="1">
  </div>

  <div class="mb-3">
    <label>Position</label>
    <input name="position" type="number" class="form-control" value="0">
  </div>

  <button class="btn btn-primary" type="submit">Add Question</button>
</form>

<a class="btn btn-secondary mt-2" href="{{ url_for('quiz.get_quiz', course_id=course_id, quiz_id=quiz_id) }}">Back</a>

{% endblock %}
