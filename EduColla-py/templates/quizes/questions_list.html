{% extends "base.html" %}
{% block content %}
<h2>Question Bank</h2>

{# 如果你 url_map 显示的是 quiz.new_question，就改回去 #}
<a href="{{ url_for('quiz.new_question_form', course_id=course_id) }}" class="btn btn-success mb-2">New Question</a>

<ul class="list-group">
  {% for q in questions %}
    <li class="list-group-item">
      <strong>[{{ q['qtype'] }}]</strong> {{ q['prompt'] }}
    </li>
  {% endfor %}
</ul>

<a href="{{ url_for('quiz.list_quizzes', course_id=course_id) }}" class="btn btn-secondary mt-2">Back to Quizzes</a>
{% endblock %}
