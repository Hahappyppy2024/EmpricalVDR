{% extends "base.html" %}
{% block content %}

<h2>{% if quiz %}Edit Quiz{% else %}New Quiz{% endif %}</h2>

{% if quiz %}
  <form method="post" action="{{ url_for('quiz.update_quiz_html', course_id=course_id, quiz_id=quiz['quiz_id']) }}">
{% else %}
  <form method="post" action="{{ url_for('quiz.create_quiz', course_id=course_id) }}">
{% endif %}

  <div class="mb-3">
    <label>Title</label>
    <input class="form-control" name="title" value="{{ quiz['title'] if quiz else '' }}" required>
  </div>

  <div class="mb-3">
    <label>Description</label>
    <textarea class="form-control" name="description">{{ quiz['description'] if quiz else '' }}</textarea>
  </div>

  <div class="mb-3">
    <label>Open At</label>
    <input class="form-control" name="open_at" placeholder="YYYY-MM-DD HH:MM:SS"
           value="{{ quiz['open_at'] if quiz else '' }}">
  </div>

  <div class="mb-3">
    <label>Due At</label>
    <input class="form-control" name="due_at" placeholder="YYYY-MM-DD HH:MM:SS"
           value="{{ quiz['due_at'] if quiz else '' }}">
  </div>

  <button class="btn btn-primary" type="submit">Save</button>
</form>

<a class="btn btn-secondary mt-2" href="{{ url_for('quiz.list_quizzes', course_id=course_id) }}">Back</a>

{% endblock %}
