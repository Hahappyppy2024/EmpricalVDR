{% extends "base.html" %}
{% block content %}
<h2>Course Members</h2>
<a href="{{ url_for('course.add_member_form', course_id=course_id) }}" class="btn btn-sm btn-success mb-2">Add Member</a>
<table class="table">
    <thead><tr><th>User</th><th>Role</th><th>Actions</th></tr></thead>
    <tbody>
    {% for m in members %}
    <tr>
        <td>{{ m.display_name }} ({{ m.username }})</td>
        <td>{{ m.role_in_course }}</td>
        <td>
            <form action="{{ url_for('course.remove_member', course_id=course_id, membership_id=m.membership_id) }}" method="post" style="display:inline">
                <button type="submit" class="btn btn-sm btn-danger">Remove</button>
            </form>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
<a href="{{ url_for('course.get_course', course_id=course_id) }}" class="btn btn-secondary">Back to Course</a>
{% endblock %}
