{% extends "base.html" %}
{% block content %}
<h2>Posts</h2>
<form method="get" class="mb-3">
    <input type="text" name="keyword" placeholder="Search..." class="form-control" value="{{ request.args.get('keyword', '') }}">
    <button type="submit" class="btn btn-sm btn-outline-secondary mt-1">Search</button>
</form>
<a href="{{ url_for('post.new_post', course_id=course_id) }}" class="btn btn-success mb-2">New Post</a>
<ul class="list-group">
{% for p in posts %}
    <li class="list-group-item">
        <a href="{{ url_for('post.get_post', course_id=course_id, post_id=p.post_id) }}">{{ p.title }}</a>
        <small class="text-muted d-block">{{ p.created_at }}</small>
    </li>
{% endfor %}
</ul>
<a href="{{ url_for('course.get_course', course_id=course_id) }}" class="btn btn-secondary mt-2">Back</a>
{% endblock %}
