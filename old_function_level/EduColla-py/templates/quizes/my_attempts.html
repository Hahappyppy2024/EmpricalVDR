{% extends "base.html" %}
{% block content %}
<h2>My Attempts</h2>
<ul class="list-group">
{% for a in attempts %}
    <li class="list-group-item">
        Quiz: {{ a.quiz_title }} -
        Status: {{ a.submitted_at and 'Submitted' or 'In Progress' }}
        <small class="text-muted">{{ a.started_at }}</small>
    </li>
{% endfor %}
</ul>
{% endblock %}
