{% extends "base.html" %}
{% block content %}

<h2>{% if question %}Edit Question{% else %}New Question{% endif %}</h2>

{% if question %}
  <form method="post" action="{{ url_for('quiz.update_question_html', course_id=course_id, question_id=question['question_id']) }}">
{% else %}
  <form method="post" action="{{ url_for('quiz.create_question', course_id=course_id) }}">
{% endif %}

  <div class="mb-3">
    <label>Type</label>
    <select name="qtype" class="form-control">
      <option value="multiple-choice" {% if question and question['qtype']=='multiple-choice' %}selected{% endif %}>multiple-choice</option>
      <option value="short-answer" {% if question and question['qtype']=='short-answer' %}selected{% endif %}>short-answer</option>
    </select>
  </div>

  <div class="mb-3">
    <label>Prompt</label>
    <input name="prompt" class="form-control" value="{{ question['prompt'] if question else '' }}" required>
  </div>

  <div class="mb-3">
    <label>Options JSON (for multiple-choice)</label>
    <textarea name="options_json" class="form-control">{{ question['options_json'] if question else '' }}</textarea>
  </div>

  <div class="mb-3">
    <label>Answer JSON</label>
    <textarea name="answer_json" class="form-control">{{ question['answer_json'] if question else '' }}</textarea>
  </div>

  <button class="btn btn-primary" type="submit">Save</button>
</form>

<a class="btn btn-secondary mt-2" href="{{ url_for('quiz.list_questions', course_id=course_id) }}">Back</a>

{% endblock %}
