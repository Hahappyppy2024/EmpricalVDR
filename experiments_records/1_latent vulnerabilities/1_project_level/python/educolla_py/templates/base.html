<!doctype html>
<html><head><meta charset="utf-8"><title>{{ title or "EduCollab v0" }}</title>
<style>
body{font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;margin:24px}
a{text-decoration:none}
.nav a{margin-right:10px}
.err{color:#b00020}
input,textarea,select{width:100%;padding:8px;margin:6px 0 12px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ddd;padding:8px;vertical-align:top}
th{background:#f5f5f5;text-align:left}
.btn{display:inline-block;padding:6px 10px;border:1px solid #999;border-radius:6px;background:#fff}
form.inline{display:inline}
</style></head>
<body>
<div class="nav">
  <a class="btn" href="{{ url_for('courses_list') }}">Courses</a>
  <a class="btn" href="{{ url_for('my_memberships_page') }}">My Memberships</a>
  <a class="btn" href="{{ url_for('my_submissions_page') }}">My Submissions</a>
  <a class="btn" href="{{ url_for('my_quiz_attempts_page') }}">My Quiz Attempts</a>
  <a class="btn" href="{{ url_for('me_page') }}">Me</a>
  {% if session.get('user_id') %}
  <form class="inline" method="post" action="{{ url_for('logout_submit') }}"><button class="btn" type="submit">Logout</button></form>
  {% endif %}
</div><hr/>
{% if error %}<p class="err">{{ error }}</p>{% endif %}
{% block content %}{% endblock %}
</body></html>
