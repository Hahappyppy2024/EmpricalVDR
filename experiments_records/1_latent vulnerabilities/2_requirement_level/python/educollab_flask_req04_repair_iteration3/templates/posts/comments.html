{% extends 'base.html' %}
{% block content %}
<h1>Comments for {{ post['title'] }}</h1>
<p><a href="{{ url_for('posts.get_post_page', course_id=course['course_id'], post_id=post['post_id']) }}">Back to Post</a></p>
{% for comment in comments %}
<div class="card">
  <p>{{ comment['body'] }}</p>
  <p>By {{ comment['display_name'] }} at {{ comment['created_at'] }}</p>
</div>
{% else %}
<p>No comments yet.</p>
{% endfor %}
{% endblock %}
