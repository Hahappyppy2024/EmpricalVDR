{% extends 'base.html' %}
{% block content %}
<h1>New Upload for {{ course['title'] }}</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" action="{{ url_for('assignments.create_upload_submit', course_id=course['course_id']) }}" enctype="multipart/form-data">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  <label for="file">File</label>
  <input id="file" type="file" name="file" required>
  <button type="submit">Upload</button>
</form>
{% endblock %}
