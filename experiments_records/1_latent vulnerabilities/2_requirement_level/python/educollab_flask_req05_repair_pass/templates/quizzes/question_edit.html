{% extends "base.html" %}{% block content %}<h1>Edit Question</h1>{% if error %}<p>{{ error }}</p>{% endif %}<form method="post" action="/courses/{{ course.course_id }}/questions/{{ question.question_id }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><p>Type: <input name="qtype" value="{{ question.qtype }}"></p><p>Prompt: <textarea name="prompt">{{ question.prompt }}</textarea></p><p>Options JSON: <textarea name="options_json">{{ question.options_json }}</textarea></p><p>Answer JSON: <textarea name="answer_json">{{ question.answer_json }}</textarea></p><button type="submit">Save</button></form>{% endblock %}
