{% extends "base.html" %}{% block content %}
<h1>{{post.title}}</h1>
<p><i>by {{post.author_username}} | updated {{post.updated_at}}</i></p>
<pre style="white-space:pre-wrap;">{{post.body}}</pre>
<p>
<a class="btn" href="/courses/{{course_id}}/posts/{{post.post_id}}/edit">Edit</a>
<form class="inline" method="post" action="/courses/{{course_id}}/posts/{{post.post_id}}/delete"><button class="btn" type="submit">Delete</button></form>
</p>
<h2>Comments</h2>
<form method="post" action="/courses/{{course_id}}/posts/{{post.post_id}}/comments">
<textarea name="body" placeholder="Write a comment..."></textarea>
<button class="btn" type="submit">Add comment</button>
</form>
<table><tr><th>ID</th><th>Author</th><th>Body</th><th>Actions</th></tr>
{% for c in comments %}
<tr>
<td>{{c.comment_id}}</td><td>{{c.author_username}}</td>
<td>
<form method="post" action="/courses/{{course_id}}/posts/{{post.post_id}}/comments/{{c.comment_id}}">
<textarea name="body">{{c.body}}</textarea>
<button class="btn" type="submit">Update</button>
</form>
</td>
<td>
<form class="inline" method="post" action="/courses/{{course_id}}/posts/{{post.post_id}}/comments/{{c.comment_id}}/delete"><button class="btn" type="submit">Delete</button></form>
</td>
</tr>
{% endfor %}
</table>
{% endblock %}
