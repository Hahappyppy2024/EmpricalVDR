{% extends "base.html" %}{% block content %}
<h1>Edit Quiz</h1>
<form method="post" action="/courses/{{course_id}}/quizzes/{{quiz.quiz_id}}">
<label>title</label><input name="title" value="{{quiz.title}}"/>
<label>description</label><textarea name="description">{{quiz.description}}</textarea>
<label>open_at</label><input name="open_at" value="{{quiz.open_at}}"/>
<label>due_at</label><input name="due_at" value="{{quiz.due_at}}"/>
<button class="btn" type="submit">Save</button>
</form>
{% endblock %}
