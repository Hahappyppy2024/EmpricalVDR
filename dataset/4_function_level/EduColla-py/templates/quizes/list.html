{% extends "base.html" %}
{% block content %}
<h2>Quizzes</h2>

<a href="{{ url_for('quiz.new_quiz_form', course_id=course_id) }}" class="btn btn-success mb-2">New Quiz</a>
<a href="{{ url_for('quiz.list_questions', course_id=course_id) }}" class="btn btn-warning mb-2">Question Bank</a>

<ul class="list-group">
  {% for q in quizzes %}
    <li class="list-group-item">
      <a href="{{ url_for('quiz.get_quiz', course_id=course_id, quiz_id=q['quiz_id']) }}">{{ q['title'] }}</a>
    </li>
  {% endfor %}
</ul>
{% endblock %}
