{% extends "base.html" %}
{% block content %}
<h2>{{ post and 'Edit Post' or 'New Post' }}</h2>
<form method="post">
    <div class="mb-3">
        <label>Title</label>
        <input type="text" name="title" class="form-control" value="{{ post and post.title or '' }}" required>
    </div>
    <div class="mb-3">
        <label>Body</label>
        <textarea name="body" class="form-control" rows="5">{{ post and post.body or '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
</form>
{% endblock %}
