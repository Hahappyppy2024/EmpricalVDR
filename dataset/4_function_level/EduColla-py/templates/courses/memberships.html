{% extends "base.html" %}
{% block content %}
<h2>My Courses</h2>
<ul class="list-group">
{% for m in memberships %}
    <li class="list-group-item">
        <a href="{{ url_for('course.get_course', course_id=m.course_id) }}">{{ m.title }}</a>
        <span class="badge bg-secondary">{{ m.role_in_course }}</span>
    </li>
{% endfor %}
</ul>
{% endblock %}
