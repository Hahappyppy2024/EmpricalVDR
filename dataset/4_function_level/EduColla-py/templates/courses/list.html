{% extends "base.html" %}
{% block content %}
<h2>Courses</h2>
<a href="{{ url_for('course.new_course') }}" class="btn btn-success mb-2">Create Course</a>
<ul class="list-group">
{% for c in courses %}
    <li class="list-group-item">
        <a href="{{ url_for('course.get_course', course_id=c.course_id) }}">{{ c.title }}</a>
    </li>
{% endfor %}
</ul>
{% endblock %}
