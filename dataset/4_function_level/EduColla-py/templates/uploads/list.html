{% extends "base.html" %}
{% block content %}
<h2>Files</h2>
<a href="{{ url_for('upload.upload_form', course_id=course_id) }}" class="btn btn-success mb-2">Upload File</a>
<ul class="list-group">
{% for u in uploads %}
    <li class="list-group-item">
        {{ u.original_name }}
        <a href="{{ url_for('upload.download_upload', course_id=course_id, upload_id=u.upload_id) }}" class="btn btn-sm btn-primary">Download</a>
        <form action="{{ url_for('upload.delete_upload', course_id=course_id, upload_id=u.upload_id) }}" method="post" style="display:inline">
             <button type="submit" class="btn btn-sm btn-danger">Delete</button>
        </form>
    </li>
{% endfor %}
</ul>
{% endblock %}
