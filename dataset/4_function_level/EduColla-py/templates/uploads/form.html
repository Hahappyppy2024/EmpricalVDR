{% extends "base.html" %}
{% block content %}
<h2>Upload File</h2>
<!--<form method="post" enctype="multipart/form-data">-->
<form method="post" action="{{ url_for('upload.upload_file', course_id=course_id) }}" enctype="multipart/form-data">
    <div class="mb-3">
        <input type="file" name="file" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Upload</button>
</form>
{% endblock %}
