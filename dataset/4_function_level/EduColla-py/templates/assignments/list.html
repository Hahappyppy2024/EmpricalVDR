{% extends "base.html" %}
{% block content %}
<h2>Assignments</h2>
<a href="{{ url_for('assignment.new_assignment', course_id=course_id) }}" class="btn btn-success mb-2">New Assignment</a>
<ul class="list-group">
{% for a in assignments %}
    <li class="list-group-item">
        <a href="{{ url_for('assignment.get_assignment', course_id=course_id, assignment_id=a.assignment_id) }}">{{ a.title }}</a>
        <small class="text-muted">Due: {{ a.due_at or 'N/A' }}</small>
    </li>
{% endfor %}
</ul>
<a href="{{ url_for('course.get_course', course_id=course_id) }}" class="btn btn-secondary mt-2">Back</a>
{% endblock %}
