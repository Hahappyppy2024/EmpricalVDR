{% extends "base.html" %}
{% block content %}

<h2>{% if assignment %}Edit Assignment{% else %}New Assignment{% endif %}</h2>

{% if assignment %}
  <form method="post" action="{{ url_for('assignment.update_assignment_html', course_id=course_id, assignment_id=assignment['assignment_id']) }}">
{% else %}
  <form method="post" action="{{ url_for('assignment.create_assignment', course_id=course_id) }}">
{% endif %}

    <div class="mb-3">
      <label>Title</label>
      <input type="text" name="title" class="form-control"
             value="{{ assignment['title'] if assignment else '' }}" required>
    </div>

    <div class="mb-3">
      <label>Description</label>
      <textarea name="description" class="form-control">{{ assignment['description'] if assignment else '' }}</textarea>
    </div>

    <div class="mb-3">
      <label>Due At</label>
      <input type="text" name="due_at" class="form-control" placeholder="YYYY-MM-DD HH:MM:SS"
             value="{{ assignment['due_at'] if assignment else '' }}">
    </div>

    <button type="submit" class="btn btn-primary">Save</button>
  </form>

  <a class="btn btn-secondary mt-2" href="{{ url_for('assignment.list_assignments', course_id=course_id) }}">Back</a>

{% endblock %}
